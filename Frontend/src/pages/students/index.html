<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdminBot | Estudiantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="dashboard-wrapper">
    <div class="deco-blob"></div>

    <section class="students-main">
      <div class="students-header">
        <div class="header-content">
          <div class="status-indicator"></div>
          <div>
            <h2>Gestión de Estudiantes</h2>
            <p class="students-copy">Panel de control de registros académicos</p>
          </div>
        </div>
        <button id="backButton" class="btn-secondary">← Volver al Dashboard</button>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="filterInput" placeholder="Buscar por nombre, documento o código..." />
        </div>
        <select id="gradeFilter">
          <option value="">Todos los grados</option>
          <option value="1">Grado 1</option><option value="2">Grado 2</option>
          <option value="3">Grado 3</option><option value="4">Grado 4</option>
          <option value="5">Grado 5</option><option value="6">Grado 6</option>
          <option value="7">Grado 7</option><option value="8">Grado 8</option>
          <option value="9">Grado 9</option><option value="10">Grado 10</option>
          <option value="11">Grado 11</option>
        </select>
        <button id="addStudentBtn" class="btn-main">+ Agregar Estudiante</button>
      </div>

      <div class="table-container">
        <table class="students-table">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombres</th>
              <th>Apellidos</th>
              <th>Documento</th>
              <th>Grado</th>
              <th>Año</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">!</div>
        <p>No se encontraron registros en el sistema</p>
        <button id="addStudentBtnEmpty" class="btn-main">+ Crear primer registro</button>
      </div>
    </section>

    <div id="studentModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Nuevo Estudiante</h3>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <form id="studentForm" class="student-form">
          <div class="form-grid">
            <div class="input-group">
              <label>Código</label>
              <input type="text" name="codigo_estudiante" required />
            </div>
            <div class="input-group">
              <label>Nombres</label>
              <input type="text" name="nombres" required />
            </div>
            <div class="input-group">
              <label>Apellidos</label>
              <input type="text" name="apellidos" required />
            </div>
            <div class="input-group">
              <label>Documento</label>
              <input type="text" name="numero_documento" required />
            </div>
            <div class="input-group">
              <label>Grado</label>
              <select name="grado" required>
                <option value="1">1°</option><option value="11">11°</option>
              </select>
            </div>
            <div class="input-group">
              <label>Año Lectivo</label>
              <input type="text" name="anio_lectivo" placeholder="2026" required />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-secondary" id="cancelBtn">Cancelar</button>
            <button type="submit" class="btn-main">Guardar Registro</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script type="module" src="./students.js"></script>
</body>
</html>
