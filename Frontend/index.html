<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdminBot | Iniciar sesión</title>
    <link rel="stylesheet" href="./src/shared/css/main.css">
    <link rel="stylesheet" href="/src/pages/auth/styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="scene-wrap">
        <canvas id="robot-background"></canvas>
        <div class="scene-overlay" aria-hidden="true"></div>
      </div>

      <section class="auth-card" aria-labelledby="auth-title">
        <div class="auth-header">
          <span class="eyebrow">Accede a tu cuenta</span>
          <h1 id="auth-title">Bienvenido a AdminBot</h1>
          <p class="auth-copy">Gestiona asistencia y pagos de forma inteligente</p>
        </div>

        <form class="login-form" autocomplete="off">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />

          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Contraseña" required />

          <div class="form-footer">
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            <button type="submit" class="button-primary">Iniciar sesión</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/src/pages/auth/login.js"></script>
  </body>
</html>
